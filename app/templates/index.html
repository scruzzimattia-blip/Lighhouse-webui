<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            background: rgba(59, 130, 246, 0.1);
            padding: 10px;
            border-radius: 12px;
            color: var(--accent);
        }

        h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-healthy { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }

        .container-item {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container-info { display: flex; align-items: center; gap: 16px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-running { background: var(--success); box-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        .dot-other { background: var(--error); }

        .logs-panel {
            background: #020617;
            padding: 24px;
            border-radius: 20px;
            height: 500px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.7;
            color: #cbd5e1;
            border: 1px solid var(--border);
        }

        .log-line { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-prefix { color: var(--accent); opacity: 0.7; }

        .update-stats {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 12px;
            font-weight: 500;
        }

        .update-pill {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <div class="logo-box"><i data-lucide="shield-check" size="32"></i></div>
            <div>
                <h1>Lighthouse</h1>
                <div class="subtitle">Docker Update Monitor</div>
            </div>
        </div>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div id="system-status" class="status-badge status-healthy">
                <i data-lucide="check-circle-2" size="18"></i>
                <span id="status-text">System Healthy</span>
            </div>
            <button onclick="refreshData()">
                <i data-lucide="refresh-cw" size="18" id="sync-icon"></i> Sync
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(59, 130, 246, 0.1); color: var(--accent);"><i data-lucide="container"></i></div>
            <div>
                <div class="subtitle" style="font-weight: 600; text-transform: uppercase;">Watched</div>
                <div id="stat-watched" style="font-size: 28px; font-weight: 800;">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);"><i data-lucide="zap"></i></div>
            <div>
                <div class="subtitle" style="font-weight: 600; text-transform: uppercase;">Total Updates</div>
                <div id="stat-total-updates" style="font-size: 28px; font-weight: 800;">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--error);"><i data-lucide="alert-circle"></i></div>
            <div>
                <div class="subtitle" style="font-weight: 600; text-transform: uppercase;">Issues</div>
                <div id="stat-issues" style="font-size: 28px; font-weight: 800;">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;"><i data-lucide="server"></i></div>
            <div>
                <div class="subtitle" style="font-weight: 600; text-transform: uppercase;">Engine Status</div>
                <div id="stat-engine" style="font-size: 24px; font-weight: 800;">Offline</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <section>
            <h2 style="font-size: 18px; margin-bottom: 20px;">Active Monitoring</h2>
            <div id="container-list">
                <!-- Containers populate here -->
            </div>
        </section>
        <section>
            <h2 style="font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="terminal" size="20" style="color: var(--accent)"></i> Engine Logs
            </h2>
            <div id="logs" class="logs-panel">Initialising...</div>
        </section>
    </div>

    <script>
        lucide.createIcons();

        async function refreshData() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('spin');
            
            try {
                const [contRes, logsRes] = await Promise.all([
                    fetch('/api/containers'),
                    fetch('/api/lighthouse/logs')
                ]);
                
                const containers = await contRes.json();
                const logs = await logsRes.text();
                
                updateUI(containers, logs);
            } catch (err) {
                console.error(err);
                document.getElementById('stat-engine').textContent = 'Error';
            } finally {
                setTimeout(() => syncIcon.classList.remove('spin'), 500);
            }
        }

        function updateUI(containers, logs) {
            // Update Stats
            const running = containers.filter(c => c.State === 'running').length;
            const issues = containers.length - running;
            const totalUpdates = containers.reduce((acc, c) => acc + (c.UpdateCount || 0), 0);
            
            document.getElementById('stat-watched').textContent = containers.length;
            document.getElementById('stat-total-updates').textContent = totalUpdates;
            document.getElementById('stat-issues').textContent = issues;
            document.getElementById('stat-engine').textContent = 'Active';

            // Update Status Badge
            const statusBadge = document.getElementById('system-status');
            const statusText = document.getElementById('status-text');
            if (issues === 0 && containers.length > 0) {
                statusBadge.className = 'status-badge status-healthy';
                statusText.textContent = 'System Healthy';
            } else {
                statusBadge.className = 'status-badge status-error';
                statusText.textContent = 'Attention Required';
            }

            // Update List
            const list = document.getElementById('container-list');
            list.innerHTML = containers.map(c => `
                <div class="container-item">
                    <div style="width: 100%">
                        <div class="container-info">
                            <div class="status-dot ${c.State === 'running' ? 'dot-running' : 'dot-other'}"></div>
                            <div style="flex: 1">
                                <div style="display: flex; justify-content: space-between; align-items: center">
                                    <div style="font-weight: 700; font-size: 16px;">${c.Names[0]}</div>
                                    <div style="font-size: 11px; font-weight: 800; background: ${c.State === 'running' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; color: ${c.State === 'running' ? 'var(--success)' : 'var(--error)'}; padding: 4px 10px; border-radius: 8px;">${c.State.toUpperCase()}</div>
                                </div>
                                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px; font-family: 'JetBrains Mono'">${c.Image}</div>
                                <div class="update-stats">
                                    <div class="update-pill"><i data-lucide="history" size="14"></i> Updates: ${c.UpdateCount}</div>
                                    <div class="update-pill"><i data-lucide="clock" size="14"></i> Zuletzt: ${c.LastUpdate}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Update Logs
            const logPanel = document.getElementById('logs');
            logPanel.innerHTML = logs.split('\n').map(line => `
                <div class="log-line">
                    <span class="log-prefix">›</span>
                    <span>${line}</span>
                </div>
            `).join('');
            logPanel.scrollTop = logPanel.scrollHeight;

            lucide.createIcons();
        }

        refreshData();
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
